<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Anambra Weather App</title>
<style>
  body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg, #2193b0, #6dd5ed);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
  }
 .card {
    background: #1e3a5f;
    color:white;
    padding:30px;
    border-radius:20px;
    text-align:center;
    width:350px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }
  input, button {
    padding:10px;
    border:none;
    border-radius:8px;
    font-size:16px;
  }
  input { width:60%; }
  button { background:#00a8ff; color:white; cursor:pointer; }
  button:hover { background:#0097e6; }
</style>
</head>
<body>
<div class="card">
  <h1>☀️ Anambra Weather App</h1>
  <input type="text" id="city" placeholder="Enter city" value="Igbariam">
  <button onclick="getWeather()">Search</button>
  
  <h2 id="location">Anambra State</h2>
  <h1 id="temp">30°C</h1>
  <p id="desc">Sunny</p>
  <p>💧 Humidity: <span id="humidity">50</span>%</p>
  <p>💨 Wind: <span id="wind">5</span> km/h</p>
</div>

<script>
const API_KEY = "YOUR_API_KEY_HERE"; // Get free key from openweathermap.org

async function getWeather() {
  let city = document.getElementById("city").value;
  let url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`;
  
  let res = await fetch(url);
  let data = await res.json();
  
  document.getElementById("location").innerText = data.name + ", " + data.sys.country;
  document.getElementById("temp").innerText = Math.round(data.main.temp) + "°C";
  document.getElementById("desc").innerText = data.weather[0].main;
  document.getElementById("humidity").innerText = data.main.humidity;
  document.getElementById("wind").innerText = data.wind.speed;
}

// Load Igbariam on start
getWeather();
</script>
</body>
</html>
